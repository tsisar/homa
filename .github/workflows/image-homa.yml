name: Build homa image

on:
  push:
    branches: [main, release]
    tags: ["v*"]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - ".github/workflows/image-homa.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io/tsisar
  IMAGE: homa
  DOCKERFILE: Dockerfile

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Compute tags
        id: tags
        run: |
          SHORT=$(git rev-parse --short HEAD)
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME}"
            TAGS="${REGISTRY}/${IMAGE}:${GITHUB_REF_NAME},${REGISTRY}/${IMAGE}:${SHORT},${REGISTRY}/${IMAGE}:latest"
          elif [ "$GITHUB_REF_NAME" = "release" ]; then
            VERSION="${SHORT}"
            TAGS="${REGISTRY}/${IMAGE}:${SHORT},${REGISTRY}/${IMAGE}:latest"
          else
            VERSION="${SHORT}-dev"
            TAGS="${REGISTRY}/${IMAGE}:${SHORT}-dev,${REGISTRY}/${IMAGE}:dev"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"
          echo "Tags: ${TAGS}"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            VERSION=${{ steps.tags.outputs.version }}
